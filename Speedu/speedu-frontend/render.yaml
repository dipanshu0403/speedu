# Render Static Site — set Root Directory to: Speedu/speedu-frontend (repo: dipanshu0403/speedu)
services:
  - type: web
    name: speedu-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://speedu-backend-0xid.onrender.com/api
